name: Scala CI

env:
 BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'sbt'
    - name: Setup sbt launcher
      uses: sbt/setup-sbt@v1
    - name: Run install
      uses: borales/actions-yarn@v4
      with:
        cmd: install
    - name: Run tests
      run: sbt test
    - name: Build Prod Artifact (Scala)
      if: ${{ env.BRANCH_NAME == 'deployment-test' }}
      run: sbt fullLinkJS
    - name: Build Prod Artifact (JS)
      if: ${{ env.BRANCH_NAME == 'deployment-test' }}
      run: yarn parcel build index.html
    - name: Upload Prod Artifact
      if: ${{ env.BRANCH_NAME == 'deployment-test' }}
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: 'js-build'
        path: './dist/'
  
